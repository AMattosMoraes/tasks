<head>
    <meta charset="UTF-8">
    <title>Lista de Módulo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        span {
            font-family: Calibri;
        }

        .table-personal {
            background-color: #6c757d;
            color: white;
        }

        .navbar-blue-per {
            background-color: #052C65;
        }

        h2 {
            letter-spacing: 2px;
            word-spacing: 6px;

<body class="container py-5">

        </a>
        <div class="d-flex">
            <a href="/cadastromodulo" class="btn btn-primary me-2"><i class="bi bi-people-fill me-2"></i> Cadastrar Módulos </a>
            <a href="/" class="btn btn-secondary"><i class="bi bi-menu-up me-2"></i> Menu Principal </a>
        </div>
    </div>
</nav>
<!-- Conteúdo -->
<div class="container vh-100">

    <h2 class="text-center mt-5 mb-5"> Lista de Módulos </h2>

    <div class="table-responsive">

<!--                    <button type="submit" class="btn btn-primary w-100"> <i class="bi bi-search"></i> Pesquisar </button>-->
<!--                </div>-->
<!--            </form>-->
<!--        </div>-->

        <table class="table table-striped table-hover align-middle border rounded shadow">
            <thead class="table-personal">
            <tr>
                <th>ID</th>
                <th>Sistema</th>
                <th>Modulo</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="modulo : ${listamodulo}">
                <td th:text="${modulo.id}"></td>
                <td th:text="${modulo.descsistema}"></td>
                <td th:text="${modulo.descmodulo}"></td>
                <td class="text-center">

                    <a th:href="@{/editarmodulo/{id}(id=${modulo.id})}" class="btn btn-warning btn-sm me-2">
                        <i class="bi bi-pencil-square"></i> Editar </a>

                    <a th:href="@{/excluirmodulo/{id}(id=${modulo.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja excluir este cliente?');">
                        <i class="bi bi-trash"></i> Excluir </a>

                </td>
            </tr>
            </tbody>
        </table>

        <!-- Informação de páginas  -->
        <span class="text-centermt-5 mb-5 "> Página
            <span th:text="${currentPage + 1}"></span> de
            <span th:text="${totalPages}"></span>
        </span>

        <div class="d-flex justify-content-center align-items-center mt-2">
            <nav aria-label="Navegação de páginas">
                <ul class="pagination pagination-sm">

                    <!-- Botão Anterior -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/listamodulo(page=${currentPage - 1})}" aria-label="Anterior">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>

                    <!-- Números das páginas -->
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages -1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/listamodulo(page=${i})}" th:text="${i + 1}"></a>
                    </li>

                    <!-- Botão Próxima -->
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/listamodulo(page=${currentPage + 1})}" aria-label="Próxima">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

    </div>
</div>

<!-- Rodapé -->
<div th:insert="fragments/footer :: footer"></div>
