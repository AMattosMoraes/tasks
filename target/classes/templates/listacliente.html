<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        span {
            font-family: Calibri;
        }

        .table-personal {
            background-color: #6c757d;
            color: white;
        }

        .navbar-blue-per {
            background-color: #052C65;
        }

        h2 {
            /*font-family: Calibri;*/
            /*background: #052C65;*/
            /*color: white;*/
            /*font-size: larger;*/
            /*margin-top: 100px;*/
            letter-spacing: 2px;
            word-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* sombra suave */
            margin-top: 20px; /* ajusta a distância do topo */
            margin-bottom: 10px; /* espaçamento inferior */
        }
    </style>
</head>
<!--<body class="bg-light">-->
<body class="container py-5">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-blue-per fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand align-items-center" href="#">
<!--            <img src="logo.png" alt="Logo da Empresa" width="50" class="me-2 img-fluid border rounded shadow">-->
            <span> Sistema de Controle de Tarefas </span>
        </a>
        <div class="d-flex">
            <a href="/cadastrocliente" class="btn btn-primary me-2"><i class="bi bi-people-fill me-2"></i> Cadastrar Cliente </a>
            <a href="/" class="btn btn-secondary"><i class="bi bi-menu-up me-2"></i> Menu Principal </a>
        </div>
    </div>
</nav>
<!-- Conteúdo -->
<div class="container vh-100">

    <h2 class="text-center mt-5 mb-5"> Lista de Clientes </h2>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle border rounded shadow">
            <thead class="table-personal">
            <tr>
                <th>ID</th>
                <th>CNPJ</th>
                <th>Nome</th>
                <th>UF</th>
                <th>Contato</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${listacliente}">
                <td th:text="${cliente.id}"></td>
                <td th:text="${cliente.cnpj}"></td>
                <td th:text="${cliente.nome}"></td>
                <td th:text="${cliente.uf}"></td>
                <td th:text="${cliente.contato}"></td>
                <td class="text-center">

                    <a th:href="@{/editarcliente/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm me-2">
                        <i class="bi bi-pencil-square"></i> Editar </a>

                    <a th:href="@{/excluircliente/{id}(id=${cliente.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja excluir este cliente?');">
                        <i class="bi bi-trash"></i> Excluir </a>

                </td>
            </tr>
            </tbody>
        </table>

        <!-- Informação de páginas  -->
<!--        <span class="text-muted">-->
        <span class="text-centermt-5 mb-5 "> Página
            <span th:text="${currentPage + 1}"></span> de
            <span th:text="${totalPages}"></span>
        </span>

<!--        <div class="d-flex justify-content-center mt-4">-->
        <div class="d-flex justify-content-center align-items-center mt-2">
            <nav aria-label="Navegação de páginas">
                <ul class="pagination pagination-sm">

                    <!-- Botão Anterior -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/listacliente(page=${currentPage - 1})}" aria-label="Anterior">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>

                    <!-- Números das páginas -->
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages -1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/listacliente(page=${i})}" th:text="${i + 1}"></a>
                    </li>

                    <!-- Botão Próxima -->
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/listacliente(page=${currentPage + 1})}" aria-label="Próxima">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

    </div>
</div>

<!-- Rodapé -->
<div th:insert="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
