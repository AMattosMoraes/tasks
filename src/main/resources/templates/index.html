<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/amm.ico}" type="image/x-icon">
    <link rel="icon" type="image/x-icon" href="@{/amm.ico}">
    <style>
        :root {
            --primary-color: #052C65; /* Cor do seu Logo */
            --hover-color: #0a3d85;   /* Tom ligeiramente mais claro para o hover */
            --accent-color: #00d4ff;  /* Cor de destaque (opcional) */
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-blue-per {
            background-color: #052C65;
        }

        /* Estilo do Card do Menu */
        .menu-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        h2 {
            color: var(--primary-color);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
        }

        /* Botões Modernos */
        .btn-custom {
            background-color: var(--primary-color);
            border: none;
            padding: 12px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-custom:hover {
            background-color: var(--hover-color);
            border-right: 4px solid var(--accent-color);
            transform: translateX(10px); /* Move levemente para a direita */
            box-shadow: 4px 4px 15px rgba(5, 44, 101, 0.2);
            color: white;
        }

        .btn-custom i {
            font-size: 1.2rem;
            margin-right: 15px;
        }
    </style>
</head>
<body class="bg-light">

<!-- Navbar com logo à esquerda -->
<div th:insert="fragments/navbar_pri :: meu-navbar-pri"></div>

<!-- Conteúdo central -->
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 align-items-center">

        <!-- Coluna Esquerda com o Card -->
        <div class="col-md-5 offset-md-1">
            <div class="menu-card">
                <h2>Painel de Controle</h2>
                <div class="d-grid gap-2">
                    <a href="listacliente" class="btn btn-custom btn-lg text-white">
                        <i class="bi bi-people-fill"></i> Clientes
                    </a>
                    <a href="listasistema" class="btn btn-custom btn-lg text-white">
                        <i class="bi bi-hdd-network-fill"></i> Sistemas
                    </a>
                    <a href="listamodulo" class="btn btn-custom btn-lg text-white">
                        <i class="bi bi-layers-half"></i> Módulos
                    </a>
                    <a href="listaordemservico" class="btn btn-custom btn-lg text-white">
                        <i class="bi bi-clipboard-check"></i> Ordens de Serviço
                    </a>
                </div>
            </div>
        </div>

        <!-- Coluna Direita: Imagem com efeito suave -->
        <div class="col-md-5 d-flex justify-content-center">
            <img src="imagem.png" alt="Ilustração" class="img-fluid rounded-4 shadow-lg" style="max-height: 400px;">
        </div>
    </div>
</div>

<!-- Rodapé -->
<div th:insert="fragments/footer :: meu-rodape"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</body>
</html>
