<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        span{
            font-family: Calibri;
        }
        .navbar-blue-per{
            background-color: #052C65;
        }
        h2{
            color: #052C65;
            letter-spacing: 2px;
            word-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="bg-light">

<!-- Navbar com logo à esquerda -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-blue-per fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand align-items-center" href="#">
            <img src="logo.png" alt="Logo da Empresa" width="50" class="me-2 img-fluid border rounded shadow">
                <span> Sistema de Controle de Tarefas </span>
        </a>
    </div>
</nav>

<!-- Conteúdo central -->
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 align-items-center">

        <div class="col-md-6 d-flex flex-column align-items-start gap-4">
            <h2 class="mb-4">Menu Principal</h2>
            <a href="listacliente" class="btn btn-primary btn-lg w-75">
                <i class="bi bi-people-fill me-2"></i> Lista de Clientes </a>

            <a href="listasistema" class="btn btn-primary btn-lg w-75">
                <i class="bi bi-hdd-network-fill me-2"></i> Lista de Sistemas </a>

            <a href="listamodulo" class="btn btn-primary btn-lg w-75">
                <i class="bi bi-hdd-network me-2"></i> Lista de Modulos </a>

            <a href="listaordemservico" class="btn btn-primary btn-lg w-75">
                <i class="bi bi-clipboard-check me-2"></i> Ordens de Serviço </a>
        </div>

        <!-- Coluna direita: imagem -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">
            <img src="imagem.png" alt="Imagem ilustrativa" class="img-fluid border rounded shadow">
        </div>
    </div>
</div>

<!-- Rodapé -->
    <div th:insert="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
