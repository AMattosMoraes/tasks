<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/amm.ico}" type="image/x-icon">
    <link rel="icon" type="image/x-icon" href="@{/amm.ico}">
    <style>
        span {
            font-family: Calibri;
        }

        .table-personal {
            background-color: #6c757d;
            color: white;
        }

        .navbar-blue-per {
            background-color: #052C65;
        }

        h2 {
            letter-spacing: 2px;
            word-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* sombra suave */
            margin-top: 20px; /* ajusta a distância do topo */
            margin-bottom: 10px; /* espaçamento inferior */
        }

        table{
            font-size: smaller;
        }

        .btn-primary {
            background-color: #052C65;
        }

        .btn-primary:hover {
            background-color: #0a3d85;
            border: none;
            transition: all 0.3s ease;
            align-items: center;
        }

        .btn-secondary:hover {
            background-color: darkgray;
            border: none;
            transition: all 0.3s ease;
            align-items: center;
        }

    </style>
</head>

<body class="container py-5">

<div th:insert="fragments/navbar_sec :: meu-navbar-sec"></div>

<div class="container vh-100">

    <div class="container mt-5 mb-5 d-flex justify-content-between align-items-center">
        <h2 class="m-0"> Lista de Clientes </h2>
        <div class="d-flex">
            <a href="/cadastrocliente" class="btn btn-primary me-2"><i class="bi bi-people-fill me-2"></i> Cadastrar Cliente </a>
            <a href="/" class="btn btn-secondary"><i class="bi bi-menu-up me-2"></i> Menu Principal </a>
        </div>
    </div>

<!--    Filtro Ativo/Inativo-->
    <div class="container mb-3 shadow-sm p-3 bg-light rounded border">
        <form th:action="@{/listacliente}" method="get">
            <div class="d-flex align-items-center gap-4">
                <span class="fw-bold text-secondary"><i class="bi bi-funnel"></i> Status:</span>

                <div class="form-check">
                    <!-- 'value=""' traz todos (cai no ELSE do seu Controller) -->
                    <input class="form-check-input" type="radio" name="ativo" id="todos" value=""
                           th:checked="${ativo == null || ativo == ''}" onchange="this.form.submit()">
                    <label class="form-check-label" for="todos">Todos</label>
                </div>

                <div class="form-check">
                    <!-- 'value="S"' filtra Ativos (cai no IF do seu Controller) -->
                    <input class="form-check-input" type="radio" name="ativo" id="btnAtivo" value="S"
                           th:checked="${ativo == 'S'}" onchange="this.form.submit()">
                    <label class="form-check-label" for="btnAtivo">Ativos</label>
                </div>

                <div class="form-check">
                    <!-- 'value="N"' filtra Inativos (cai no IF do seu Controller) -->
                    <input class="form-check-input" type="radio" name="ativo" id="btnInativo" value="N"
                           th:checked="${ativo == 'N'}" onchange="this.form.submit()">
                    <label class="form-check-label" for="btnInativo">Inativos</label>
                </div>
            </div>
        </form>
    </div>


    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle border rounded shadow">
            <thead class="table-personal">
            <tr>
                <th>ID</th>
                <th>CNPJ</th>
                <th>Nome</th>
                <th>UF</th>
                <th>Contato</th>
                <th>Ativo</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${listacliente}">
                <td th:text="${cliente.id}"></td>
                <td class="cnpj-mask" th:text="${cliente.cnpj}"></td>
                <td th:text="${cliente.nome}"></td>
                <td th:text="${cliente.uf}"></td>
                <td th:text="${cliente.contato}"></td>
                <td>
                    <span th:if="${cliente.ativo == 'S'}" class="badge bg-success">Ativo</span>
                    <span th:if="${cliente.ativo == 'N'}" class="badge bg-danger">Inativo</span>
                </td>
                <td class="text-center">

                    <a th:href="@{/editarcliente/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm me-2">
                        <i class="bi bi-pencil-square"></i> Editar </a>

                    <a th:href="@{/excluircliente/{id}(id=${cliente.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja excluir este cliente?');">
                        <i class="bi bi-trash"></i> Excluir </a>

                </td>
            </tr>
            </tbody>
        </table>

        <!-- Informação de páginas  -->
        <span class="text-centermt-5 mb-5 "> Página
            <span th:text="${currentPage + 1}"></span> de
            <span th:text="${totalPages}"></span>
        </span>

<!--        <div class="d-flex justify-content-center mt-4">-->
        <div class="d-flex justify-content-center align-items-center mt-2">
            <nav aria-label="Navegação de páginas">
                <ul class="pagination pagination-sm">

                    <!-- Botão Anterior - ADICIONADO ativo=${ativo} -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/listacliente(page=${currentPage - 1}, ativo=${ativo})}" aria-label="Anterior">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>

                    <!-- Números das páginas - JÁ ESTAVA CORRETO -->
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/listacliente(page=${i}, ativo=${ativo})}" th:text="${i + 1}"></a>
                    </li>

                    <!-- Botão Próxima - CORRIGIDO page=${currentPage + 1} e ADICIONADO ativo=${ativo} -->
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/listacliente(page=${currentPage + 1}, ativo=${ativo})}" aria-label="Próxima">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>


    </div>
</div>

<!-- Rodapé -->
<div th:insert="fragments/footer :: meu-rodape"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!--Aplica mascara no campo CNPJ-->
<script>
    function aplicarMascaraCNPJ() {
        const cnpjs = document.querySelectorAll('.cnpj-mask');
        cnpjs.forEach(td => {
            let valor = td.textContent.replace(/\D/g, ''); // Remove tudo que não é número
            if (valor.length === 14) {
                td.textContent = valor.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5");
            }
        });
    }

    // Executa ao carregar a página
    document.addEventListener('DOMContentLoaded', aplicarMascaraCNPJ);
</script>

</body>
</html>
